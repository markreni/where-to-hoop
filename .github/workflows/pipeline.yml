name: Vitest Tests               
on:
    push:
      branches: [ main, master ]
    pull_request:
      branches: [ main, master ]
      types: [opened, synchronize]
jobs:
    test:
      timeout-minutes: 60
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
        working-directory: frontend-where-to-hoop
      - name: Run Vitest
        run: npm test -- --run
        working-directory: frontend-where-to-hoop
